name: Feature / improvement
description: Propose new behavior or an improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / user need
      description: Describe the outcome we want, not the code. Who needs this and why?
      placeholder: "Students lose their place in a course — we need a 'continue watching' entry point…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional sketch. The builder + their agent decide the implementation.
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: How do we know this is finished and working?
      placeholder: |
        - Home shows the last-watched lesson per track
        - Works in demo mode with seeded data
    validations:
      required: true
