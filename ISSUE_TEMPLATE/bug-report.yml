name: Bug report
description: Something is broken or behaving wrong
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
      placeholder: "Checkout shows change due of -$2 when the customer pays exact amount…"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Log in as demo admin
        2. Open POS, add 2 items
        3. …
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Where
      description: URL, page, screen, or file/function if known
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, error output, logs
