name: Profile Checks

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: profile-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify public profile files
        run: python3 scripts/verify_profile.py
